server {
    listen       80;
    server_name  localhost;

    # Redirects generated from slugs
    rewrite ^/ia-para-talleres-automotrices/(.*)$ /chatbot-whatsapp-para-talleres-automotrices/$1 permanent;
    rewrite ^/ia-para-talleres-automotrices$ /chatbot-whatsapp-para-talleres-automotrices/ permanent;
    rewrite ^/talleres-automotrices/(.*)$ /chatbot-whatsapp-para-talleres-automotrices/$1 permanent;
    rewrite ^/talleres-automotrices$ /chatbot-whatsapp-para-talleres-automotrices/ permanent;
    rewrite ^/ia-para-salones-de-belleza/(.*)$ /chatbot-whatsapp-para-salones-de-belleza/$1 permanent;
    rewrite ^/ia-para-salones-de-belleza$ /chatbot-whatsapp-para-salones-de-belleza/ permanent;
    rewrite ^/salones-de-belleza/(.*)$ /chatbot-whatsapp-para-salones-de-belleza/$1 permanent;
    rewrite ^/salones-de-belleza$ /chatbot-whatsapp-para-salones-de-belleza/ permanent;
    rewrite ^/ia-para-hoteles-y-hostales/(.*)$ /chatbot-whatsapp-para-hoteles-y-hostales/$1 permanent;
    rewrite ^/ia-para-hoteles-y-hostales$ /chatbot-whatsapp-para-hoteles-y-hostales/ permanent;
    rewrite ^/hoteles-y-hostales/(.*)$ /chatbot-whatsapp-para-hoteles-y-hostales/$1 permanent;
    rewrite ^/hoteles-y-hostales$ /chatbot-whatsapp-para-hoteles-y-hostales/ permanent;
    rewrite ^/ia-para-gimnasios/(.*)$ /chatbot-whatsapp-para-gimnasios/$1 permanent;
    rewrite ^/ia-para-gimnasios$ /chatbot-whatsapp-para-gimnasios/ permanent;
    rewrite ^/gimnasios/(.*)$ /chatbot-whatsapp-para-gimnasios/$1 permanent;
    rewrite ^/gimnasios$ /chatbot-whatsapp-para-gimnasios/ permanent;
    rewrite ^/ia-para-veterinarias/(.*)$ /chatbot-whatsapp-para-veterinarias/$1 permanent;
    rewrite ^/ia-para-veterinarias$ /chatbot-whatsapp-para-veterinarias/ permanent;
    rewrite ^/veterinarias/(.*)$ /chatbot-whatsapp-para-veterinarias/$1 permanent;
    rewrite ^/veterinarias$ /chatbot-whatsapp-para-veterinarias/ permanent;
    rewrite ^/ia-para-academias-cursos/(.*)$ /chatbot-whatsapp-para-academias-cursos/$1 permanent;
    rewrite ^/ia-para-academias-cursos$ /chatbot-whatsapp-para-academias-cursos/ permanent;
    rewrite ^/academias-cursos/(.*)$ /chatbot-whatsapp-para-academias-cursos/$1 permanent;
    rewrite ^/academias-cursos$ /chatbot-whatsapp-para-academias-cursos/ permanent;
    rewrite ^/ia-para-spas-centros-esteticos/(.*)$ /chatbot-whatsapp-para-spas-centros-esteticos/$1 permanent;
    rewrite ^/ia-para-spas-centros-esteticos$ /chatbot-whatsapp-para-spas-centros-esteticos/ permanent;
    rewrite ^/spas-centros-esteticos/(.*)$ /chatbot-whatsapp-para-spas-centros-esteticos/$1 permanent;
    rewrite ^/spas-centros-esteticos$ /chatbot-whatsapp-para-spas-centros-esteticos/ permanent;
    rewrite ^/ia-para-restaurantes/(.*)$ /chatbot-whatsapp-para-restaurantes/$1 permanent;
    rewrite ^/ia-para-restaurantes$ /chatbot-whatsapp-para-restaurantes/ permanent;
    rewrite ^/restaurantes/(.*)$ /chatbot-whatsapp-para-restaurantes/$1 permanent;
    rewrite ^/restaurantes$ /chatbot-whatsapp-para-restaurantes/ permanent;
    rewrite ^/ia-para-inmobiliarias/(.*)$ /chatbot-whatsapp-para-inmobiliarias/$1 permanent;
    rewrite ^/ia-para-inmobiliarias$ /chatbot-whatsapp-para-inmobiliarias/ permanent;
    rewrite ^/inmobiliarias/(.*)$ /chatbot-whatsapp-para-inmobiliarias/$1 permanent;
    rewrite ^/inmobiliarias$ /chatbot-whatsapp-para-inmobiliarias/ permanent;
    rewrite ^/ia-para-clinicas-dentales/(.*)$ /chatbot-whatsapp-para-clinicas-dentales/$1 permanent;
    rewrite ^/ia-para-clinicas-dentales$ /chatbot-whatsapp-para-clinicas-dentales/ permanent;
    rewrite ^/clinicas-dentales/(.*)$ /chatbot-whatsapp-para-clinicas-dentales/$1 permanent;
    rewrite ^/clinicas-dentales$ /chatbot-whatsapp-para-clinicas-dentales/ permanent;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # Optional: try_files $uri $uri/ /index.html;
    }
    
    # Custom 404 page if it exists
    error_page 404 /404.html;
}
